apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apps-mcp
  namespace: argocd
  labels:
    app: apps-mcp
spec:
  project: default
  source:
    repoURL: https://github.com/BestNathan/nitops.git
    targetRevision: main
    path: apps-mcp
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
