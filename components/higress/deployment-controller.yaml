apiVersion: apps/v1
kind: Deployment
metadata:
  name: higress-controller
  namespace: higress-system
  labels:
    app: higress-controller
    higress: higress-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: higress-controller
      higress: higress-controller
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: higress-controller
        higress: higress-controller
    spec:
      serviceAccountName: higress-controller
      terminationGracePeriodSeconds: 30
      containers:
      - name: higress-core
        image: higress-registry.cn-hangzhou.cr.aliyuncs.com/higress/higress:2.2.0
        imagePullPolicy: IfNotPresent
        args:
        - serve
        - --gatewaySelectorKey=higress
        - --gatewaySelectorValue=higress-system-higress-gateway
        - --gatewayHttpPort=80
        - --gatewayHttpsPort=443
        - --ingressClass=higress
        - --enableAutomaticHttps=true
        - --automaticHttpsEmail=
        ports:
        - containerPort: 8888
          name: http
          protocol: TCP
        - containerPort: 8889
          name: http-solver
          protocol: TCP
        - containerPort: 15051
          name: grpc
          protocol: TCP
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: SERVICE_ACCOUNT
          valueFrom:
            fieldRef:
              fieldPath: spec.serviceAccountName
        - name: DOMAIN_SUFFIX
          value: cluster.local
        - name: GATEWAY_NAME
          value: higress-gateway
        - name: PILOT_ENABLE_GATEWAY_API
          value: "true"
        - name: PILOT_ENABLE_ALPHA_GATEWAY_API
          value: "true"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8888
            scheme: HTTP
          initialDelaySeconds: 1
          periodSeconds: 3
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            cpu: 500m
            memory: 2Gi
          limits:
            cpu: "1"
            memory: 2Gi
        volumeMounts:
        - name: log
          mountPath: /var/log
        - name: config
          mountPath: /etc/istio/config
      - name: discovery
        image: higress-registry.cn-hangzhou.cr.aliyuncs.com/higress/pilot:2.2.0
        imagePullPolicy: IfNotPresent
        args:
        - discovery
        - --monitoringAddr=:15014
        - --log_output_level=default:info
        - --domain
        - cluster.local
        - --keepaliveMaxServerConnectionAge
        - 30m
        ports:
        - containerPort: 8080
          protocol: TCP
        - containerPort: 15010
          protocol: TCP
        - containerPort: 15017
          protocol: TCP
        env:
        - name: ENABLE_PUSH_ALL_MCP_CLUSTERS
          value: "true"
        - name: PILOT_ENABLE_LDS_CACHE
          value: "false"
        - name: PILOT_ENABLE_QUIC_LISTENERS
          value: "true"
        - name: ISTIO_DUAL_STACK
          value: "false"
        - name: PILOT_ENABLE_HEADLESS_SERVICE_POD_LISTENERS
          value: "false"
        - name: PILOT_ENABLE_ALPN_FILTER
          value: "false"
        - name: ENABLE_OPTIMIZED_CONFIG_REBUILD
          value: "false"
        - name: PILOT_ENABLE_K8S_SELECT_WORKLOAD_ENTRIES
          value: "false"
        - name: HIGRESS_SYSTEM_NS
          value: higress-system
        - name: DEFAULT_UPSTREAM_CONCURRENCY_THRESHOLD
          value: "10000"
        - name: ISTIO_GPRC_MAXRECVMSGSIZE
          value: "104857600"
        - name: ENBALE_SCOPED_RDS
          value: "true"
        - name: ISTIO_DELTA_XDS
          value: "true"
        - name: ON_DEMAND_RDS
          value: "false"
        - name: HOST_RDS_MERGE_SUBSET
          value: "false"
        - name: PILOT_FILTER_GATEWAY_CLUSTER_CONFIG
          value: "true"
        - name: HIGRESS_CONTROLLER_SVC
          value: 127.0.0.1
        - name: HIGRESS_CONTROLLER_PORT
          value: "15051"
        - name: REVISION
          value: default
        - name: JWT_POLICY
          value: third-party-jwt
        - name: PILOT_CERT_PROVIDER
          value: istiod
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: SERVICE_ACCOUNT
          valueFrom:
            fieldRef:
              fieldPath: spec.serviceAccountName
        - name: KUBECONFIG
          value: /var/run/secrets/remote/config
        - name: PRIORITIZED_LEADER_ELECTION
          value: "false"
        - name: INJECT_ENABLED
          value: "false"
        - name: PILOT_ENABLE_CROSS_CLUSTER_WORKLOAD_ENTRY
          value: "false"
        - name: PILOT_ENABLE_METADATA_EXCHANGE
          value: "false"
        - name: PILOT_SCOPE_GATEWAY_TO_NAMESPACE
          value: "false"
        - name: VALIDATION_ENABLED
          value: "false"
        - name: PILOT_TRACE_SAMPLING
          value: "1"
        - name: PILOT_ENABLE_PROTOCOL_SNIFFING_FOR_OUTBOUND
          value: "true"
        - name: PILOT_ENABLE_PROTOCOL_SNIFFING_FOR_INBOUND
          value: "true"
        - name: ISTIOD_ADDR
          value: istiod.higress-system.svc:15012
        - name: PILOT_ENABLE_ANALYSIS
          value: "false"
        - name: CLUSTER_ID
          value: Kubernetes
        - name: HIGRESS_ENABLE_ISTIO_API
          value: "true"
        - name: PILOT_ENABLE_GATEWAY_API
          value: "false"
        - name: PILOT_ENABLE_ALPHA_GATEWAY_API
          value: "false"
        - name: PILOT_ENABLE_GATEWAY_API_STATUS
          value: "false"
        - name: PILOT_ENABLE_GATEWAY_API_DEPLOYMENT_CONTROLLER
          value: "false"
        - name: CUSTOM_CA_CERT_NAME
          value: higress-ca-root-cert
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 1
          periodSeconds: 3
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            cpu: 500m
            memory: 2Gi
        securityContext:
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsGroup: 1337
          runAsNonRoot: true
          runAsUser: 1337
        volumeMounts:
        - name: config
          mountPath: /etc/istio/config
        - name: istio-token
          mountPath: /var/run/secrets/tokens
          readOnly: true
        - name: local-certs
          mountPath: /var/run/secrets/istio-dns
        - name: cacerts
          mountPath: /etc/cacerts
          readOnly: true
        - name: istio-kubeconfig
          mountPath: /var/run/secrets/remote
          readOnly: true
      volumes:
      - emptyDir: {}
        name: log
      - configMap:
          name: higress-config
        name: config
      - emptyDir:
          medium: Memory
        name: local-certs
      - name: istio-token
        projected:
          defaultMode: 420
          sources:
          - serviceAccountToken:
              audience: istio-ca
              expirationSeconds: 43200
              path: istio-token
      - name: cacerts
        secret:
          defaultMode: 420
          optional: true
          secretName: cacerts
      - name: istio-kubeconfig
        secret:
          defaultMode: 420
          optional: true
          secretName: istio-kubeconfig
