apiVersion: v1
kind: Service
metadata:
  name: higress-controller
  namespace: higress-system
  labels:
    app: higress-controller
spec:
  type: ClusterIP
  selector:
    app: higress-controller
  ports:
  - port: 8888
    targetPort: 8888
    name: http
    protocol: TCP
  - port: 8889
    targetPort: 8889
    name: http-solver
    protocol: TCP
  - port: 15051
    targetPort: 15051
    name: grpc
    protocol: TCP
  - port: 15010
    targetPort: 15010
    name: grpc-xds
    protocol: TCP
  - port: 15012
    targetPort: 15012
    name: https-xds
    protocol: TCP
  - port: 443
    targetPort: 443
    name: https
    protocol: TCP
  - port: 15014
    targetPort: 15014
    name: http-monitoring
    protocol: TCP
