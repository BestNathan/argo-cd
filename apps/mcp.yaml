apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mcp
  namespace: argocd
  labels:
    app: mcp
spec:
  project: default
  source:
    repoURL: https://github.com/BestNathan/nitops.git
    targetRevision: main
    path: components/mcp
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
