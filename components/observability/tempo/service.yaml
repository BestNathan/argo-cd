apiVersion: v1
kind: Service
metadata:
  name: tempo
  namespace: observability
  labels:
    app: tempo
spec:
  type: ClusterIP
  ports:
    - port: 3200
      targetPort: 3200
      name: http
      protocol: TCP
    - port: 4317
      targetPort: 4317
      name: otlp-grpc
      protocol: TCP
    - port: 4318
      targetPort: 4318
      name: otlp-http
      protocol: TCP
    - port: 14250
      targetPort: 14250
      name: jaeger-grpc
      protocol: TCP
    - port: 14268
      targetPort: 14268
      name: jaeger-http
      protocol: TCP
    - port: 9411
      targetPort: 9411
      name: zipkin
      protocol: TCP
  selector:
    app: tempo
