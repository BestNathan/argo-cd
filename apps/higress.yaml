apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: higress
  namespace: argocd
  labels:
    app: higress
spec:
  project: default
  source:
    repoURL: https://github.com/BestNathan/nitops.git
    targetRevision: main
    path: components/higress
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
