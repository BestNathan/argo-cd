apiVersion: v1
kind: Service
metadata:
  name: higress-gateway
  namespace: higress-system
  labels:
    app: higress-gateway
spec:
  type: NodePort
  selector:
    app: higress-gateway
  ports:
  - port: 80
    targetPort: 80
    nodePort: 31693
    name: http
    protocol: TCP
  - port: 443
    targetPort: 443
    nodePort: 32077
    name: https
    protocol: TCP
